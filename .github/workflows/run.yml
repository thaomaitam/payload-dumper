# Tên của workflow, hiển thị trên tab Actions
name: Trích xuất phân vùng từ OTA (Tối ưu)

on:
  workflow_dispatch:
    inputs:
      partition_selection:
        description: 'Chọn phân vùng cần trích xuất'
        required: true
        default: 'boot'
        type: choice
        options:
          - 'boot'
          - 'init_boot'
          - 'vendor_boot'
          - 'recovery'
          - 'boot,dtbo,vbmeta'
          - 'custom'
      
      custom_partitions:
        description: 'Tên phân vùng tùy chỉnh (nếu chọn "custom")'
        required: false
        type: string
        
      ota_url:
        description: 'URL của file OTA (zip hoặc payload.bin)'
        required: true
        type: string

jobs:
  extract-and-upload:
    name: Trích xuất và Tải lên Phân vùng
    runs-on: ubuntu-latest
    
    steps:
    # Bước 1: Checkout mã nguồn từ repository của bạn
    - name: Checkout repository
      uses: actions/checkout@v4
      
    # Bước 2: Cài đặt môi trường Python và kích hoạt cache để chạy nhanh hơn
    - name: Cài đặt Python và Cache
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    # Bước 3: Cài đặt công cụ payload-dumper từ chính mã nguồn của repo
    - name: Cài đặt payload-dumper
      run: pip install .
        
    # Bước 4: Chuẩn bị tham số và thực thi trích xuất
    - name: Chuẩn bị và Trích xuất Phân vùng
      id: extract
      run: |
        # Xác định các phân vùng mục tiêu dựa trên lựa chọn của người dùng
        if [[ "${{ github.event.inputs.partition_selection }}" == "custom" ]]; then
          # Kiểm tra xem người dùng có nhập tên phân vùng tùy chỉnh không
          if [[ -z "${{ github.event.inputs.custom_partitions }}" ]]; then
            echo "❌ Lỗi: Phải nhập tên phân vùng khi chọn 'custom'."
            exit 1
          fi
          TARGET_PARTITIONS="${{ github.event.inputs.custom_partitions }}"
        else
          TARGET_PARTITIONS="${{ github.event.inputs.partition_selection }}"
        fi

        echo "✅ Các phân vùng mục tiêu: ${TARGET_PARTITIONS}"
        echo "🚀 Bắt đầu trích xuất từ URL: ${{ github.event.inputs.ota_url }}"
        
        # Đây là lệnh duy nhất cần thiết, tuân thủ 100% readme.md
        # Công cụ sẽ tự động xử lý URL, file zip và trích xuất.
        payload_dumper --partitions "${TARGET_PARTITIONS}" "${{ github.event.inputs.ota_url }}"
        
    # Bước 5: Tải lên các file kết quả (artifact)
    # Công cụ sẽ tự động tạo thư mục 'output'
    - name: Tải lên các file đã trích xuất
      uses: actions/upload-artifact@v4
      with:
        name: extracted-${{ github.event.inputs.partition_selection }}-${{ github.run_id }}
        path: output/
        if-no-files-found: error # Báo lỗi nếu không tìm thấy file nào để tải lên
        retention-days: 7 # Lưu trữ kết quả trong 7 ngày

    # Bước 6: Dọn dẹp không gian làm việc sau khi hoàn tất
    - name: Dọn dẹp
      if: always() # Luôn chạy bước này, dù thành công hay thất bại
      run: |
        echo "🧹 Dọn dẹp thư mục output..."
        rm -rf output