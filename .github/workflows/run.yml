name: Extract Boot Image from OTA

on:
  workflow_dispatch:
    inputs:
      partition_selection:
        description: 'Partition(s) to extract'
        required: true
        default: 'boot'
        type: choice
        options:
          - 'boot'
          - 'init_boot'
          - 'boot,init_boot'
          - 'boot,dtbo,vbmeta'
          - 'boot,init_boot,dtbo,vbmeta'
          - 'recovery'
          - 'vendor_boot'
          - 'custom'
      
      custom_partitions:
        description: 'Custom partitions (comma-separated, only if "custom" is selected above)'
        required: false
        type: string
        
      ota_url:
        description: 'OTA Download URL (supports direct payload.bin or zip containing payload.bin)'
        required: true
        type: string
        
      artifact_name:
        description: 'Output artifact name (optional)'
        required: false
        default: 'extracted-partitions'
        type: string

jobs:
  extract-partitions:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install payload-dumper dependencies
      run: |
        python -m pip install --upgrade pip
        pip install git+https://github.com/${{ github.repository }}.git
        
    - name: Validate input parameters
      run: |
        echo "=== Workflow Configuration ==="
        echo "Repository: ${{ github.repository }}"
        echo "Partition Selection: ${{ github.event.inputs.partition_selection }}"
        echo "Custom Partitions: ${{ github.event.inputs.custom_partitions }}"
        echo "OTA URL: ${{ github.event.inputs.ota_url }}"
        echo "Artifact Name: ${{ github.event.inputs.artifact_name }}"
        echo "=============================="
        
        # Validate URL format
        if [[ ! "${{ github.event.inputs.ota_url }}" =~ ^https?:// ]]; then
          echo "❌ Error: Invalid URL format. Must start with http:// or https://"
          exit 1
        fi
        
        # Set partitions based on selection
        if [[ "${{ github.event.inputs.partition_selection }}" == "custom" ]]; then
          if [[ -z "${{ github.event.inputs.custom_partitions }}" ]]; then
            echo "❌ Error: Custom partitions cannot be empty when 'custom' is selected"
            exit 1
          fi
          echo "PARTITIONS=${{ github.event.inputs.custom_partitions }}" >> $GITHUB_ENV
        else
          echo "PARTITIONS=${{ github.event.inputs.partition_selection }}" >> $GITHUB_ENV
        fi
        
        echo "✅ Validation completed. Extracting partitions: $PARTITIONS"
        
    - name: Create extraction directory
      run: |
        mkdir -p extracted_output
        cd extracted_output
        echo "Working directory: $(pwd)"
        
    - name: Extract partitions from OTA
      run: |
        cd extracted_output
        echo "🚀 Starting extraction process..."
        echo "Target partitions: ${{ env.PARTITIONS }}"
        echo "Source URL: ${{ github.event.inputs.ota_url }}"
        
        # Enhanced extraction with fallback mechanisms
        EXTRACTION_SUCCESS=false
        
        # Method 1: Direct payload_dumper (original approach)
        echo "🔄 Method 1: Direct payload extraction..."
        if payload_dumper --partitions "${{ env.PARTITIONS }}" "${{ github.event.inputs.ota_url }}" 2>&1 | tee extraction.log; then
          EXTRACTION_SUCCESS=true
          echo "✅ Direct extraction successful"
        else
          echo "❌ Direct extraction failed, trying alternative methods..."
          
          # Method 2: Download and extract locally
          echo "🔄 Method 2: Local download and extraction..."
          echo "Downloading OTA package..."
          
          # Use wget with resume capability and progress bar
          wget -c --progress=bar:force "${{ github.event.inputs.ota_url }}" -O ota_package.zip 2>&1 | tee -a extraction.log
          
          if [[ -f "ota_package.zip" ]]; then
            echo "✅ OTA package downloaded successfully"
            file_size=$(stat -c%s "ota_package.zip")
            echo "📦 Package size: $((file_size / 1024 / 1024)) MB"
            
            # Check if it's a ZIP file
            if unzip -l ota_package.zip 2>/dev/null | grep -q "payload.bin"; then
              echo "🔍 Found payload.bin in ZIP archive"
              
              # Extract payload.bin from ZIP
              unzip -j ota_package.zip "*/payload.bin" -d . 2>&1 | tee -a extraction.log || \
              unzip -j ota_package.zip "payload.bin" -d . 2>&1 | tee -a extraction.log
              
              if [[ -f "payload.bin" ]]; then
                echo "✅ payload.bin extracted from ZIP"
                
                # Validate payload.bin magic header
                if head -c 4 payload.bin | xxd -p | grep -q "43724155"; then
                  echo "✅ Valid payload.bin magic header (CrAU) detected"
                  
                  # Extract partitions from local payload.bin
                  if payload_dumper --partitions "${{ env.PARTITIONS }}" payload.bin 2>&1 | tee -a extraction.log; then
                    EXTRACTION_SUCCESS=true
                    echo "✅ Local payload extraction successful"
                  fi
                else
                  echo "❌ Invalid payload.bin magic header"
                  echo "🔍 Header dump:"
                  head -c 16 payload.bin | xxd
                fi
              fi
            else
              echo "❌ payload.bin not found in ZIP archive"
              echo "🔍 ZIP contents:"
              unzip -l ota_package.zip | head -20
            fi
          else
            echo "❌ Failed to download OTA package"
          fi
        fi
        
        # Final verification
        if [[ "$EXTRACTION_SUCCESS" == "true" ]]; then
          echo "📋 Extraction completed successfully. Output files:"
          ls -la
          
          # Verify extracted files
          echo "🔍 Verifying extracted partitions..."
          for partition in $(echo "${{ env.PARTITIONS }}" | tr ',' ' '); do
            if [[ -f "${partition}.img" ]]; then
              file_size=$(stat -c%s "${partition}.img")
              echo "✅ ${partition}.img - Size: ${file_size} bytes ($((file_size / 1024 / 1024)) MB)"
              
              # Additional validation for boot.img
              if [[ "$partition" == "boot" ]] && [[ -f "boot.img" ]]; then
                echo "🔍 Boot image analysis:"
                file boot.img
                # Check for Android boot magic
                if head -c 8 boot.img | grep -q "ANDROID"; then
                  echo "✅ Valid Android boot image detected"
                else
                  echo "⚠️ Unexpected boot image format"
                fi
              fi
            else
              echo "❌ Error: ${partition}.img not found"
              exit 1
            fi
          done
        else
          echo "❌ All extraction methods failed"
          echo "🔍 Troubleshooting information:"
          echo "URL: ${{ github.event.inputs.ota_url }}"
          echo "Working directory contents:"
          ls -la
          exit 1
        fi
        
    - name: Generate extraction summary
      run: |
        cd extracted_output
        echo "# Extraction Summary" > summary.md
        echo "" >> summary.md
        echo "## Configuration" >> summary.md
        echo "- **OTA Source**: ${{ github.event.inputs.ota_url }}" >> summary.md
        echo "- **Extracted Partitions**: ${{ env.PARTITIONS }}" >> summary.md
        echo "- **Extraction Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> summary.md
        echo "- **Workflow Run**: ${{ github.run_id }}" >> summary.md
        echo "" >> summary.md
        echo "## Extracted Files" >> summary.md
        
        for img_file in *.img; do
          if [[ -f "$img_file" ]]; then
            file_size=$(stat -c%s "$img_file")
            file_size_mb=$((file_size / 1024 / 1024))
            echo "- **${img_file}**: ${file_size_mb} MB (${file_size} bytes)" >> summary.md
          fi
        done
        
        echo "" >> summary.md
        echo "## SHA256 Checksums" >> summary.md
        echo "\`\`\`" >> summary.md
        sha256sum *.img >> summary.md 2>/dev/null || echo "No image files to checksum" >> summary.md
        echo "\`\`\`" >> summary.md
        
        cat summary.md
        
    - name: Upload extracted partitions
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.artifact_name }}
        path: |
          extracted_output/*.img
          extracted_output/summary.md
          extracted_output/extraction.log
        retention-days: 30
        compression-level: 6
        
    - name: Display completion status
      run: |
        echo "🎉 Extraction workflow completed successfully!"
        echo ""
        echo "📦 Artifacts uploaded:"
        echo "   Name: ${{ github.event.inputs.artifact_name }}"
        echo "   Contents: Extracted partition images + metadata"
        echo "   Retention: 30 days"
        echo ""
        echo "🔗 Download artifacts from the Actions tab of this repository."